<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopLocal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #1a1a1a; }

    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }
    .nav-brand { font-size: 18px; font-weight: 600; }
    .nav-cart {
      font-size: 14px; padding: 6px 16px;
      border: 1px solid #ddd; border-radius: 8px;
      background: #fff; cursor: pointer;
    }
    .nav-cart:hover { background: #f5f5f5; }

    .hero { padding: 32px 24px 16px; }
    .hero h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .hero p  { font-size: 14px; color: #666; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; padding: 16px 24px;
    }

    .card {
      background: #fff; border: 1px solid #e5e5e5;
      border-radius: 12px; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .card-name  { font-size: 15px; font-weight: 600; }
    .card-desc  { font-size: 13px; color: #666; line-height: 1.5; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-price { font-size: 16px; font-weight: 600; }

    .btn-add {
      font-size: 13px; padding: 6px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      background: #fff; cursor: pointer;
    }
    .btn-add:hover   { background: #f5f5f5; }
    .btn-add.added   { background: #e1f5ee; border-color: #0f6e56; color: #085041; }

    .error {
      margin: 24px; padding: 16px; background: #fff3f3;
      border: 1px solid #ffcccc; border-radius: 8px;
      color: #cc0000; font-size: 14px;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: #fff;
      padding: 10px 20px; border-radius: 8px;
      font-size: 13px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="nav-brand">ShopLocal</span>
  <button class="nav-cart" id="cart-btn">Cart: <span id="cart-count">0</span></button>
</nav>

<div class="hero">
  <h1>Fresh arrivals</h1>
  <p>Simple products. Simple checkout.</p>
</div>

{% if error %}
<div class="error">Could not load products: {{ error }}</div>
{% else %}
<div class="grid">
  {% for product in products %}
  <div class="card">
    <div class="card-name">{{ product.name }}</div>
    <div class="card-desc">{{ product.desc }}</div>
    <div class="card-footer">
      <span class="card-price">${{ product.price }}</span>
      <button class="btn-add" onclick="addToCart('{{ product.name }}', this)">Add</button>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}

<div class="toast" id="toast"></div>

<script>
  let cart = 0;

  function addToCart(name, btn) {
    cart++;
    document.getElementById('cart-count').textContent = cart;
    btn.textContent = 'Added';
    btn.classList.add('added');
    setTimeout(() => { btn.textContent = 'Add'; btn.classList.remove('added'); }, 1500);
    const t = document.getElementById('toast');
    t.textContent = name + ' added to cart';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>

</body>
</html>
