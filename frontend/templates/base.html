<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopLocal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f4f8; color: #1a1a2e; }

    /* Navbar */
    .navbar {
      background: #1a73e8; padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { color: #fff; font-size: 22px; font-weight: 700; text-decoration: none; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a {
      color: #fff; text-decoration: none; font-size: 15px;
      padding: 6px 14px; border-radius: 8px;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.2); }
    .nav-cart {
      background: #fff; color: #1a73e8;
      font-weight: 600; padding: 6px 16px;
      border-radius: 8px; text-decoration: none;
    }

    /* Footer */
    .footer {
      background: #1a73e8; color: #fff;
      text-align: center; padding: 16px;
      margin-top: 48px; font-size: 14px;
    }

    /* Buttons */
    .btn {
      display: inline-block; padding: 10px 24px;
      border-radius: 8px; text-decoration: none;
      font-size: 15px; cursor: pointer; border: none;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-danger { background: #e53935; color: #fff; }
    .btn-danger:hover { background: #b71c1c; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand">🛍️ ShopLocal</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/products">Products</a>
    <a href="/about">About</a>
    <a href="/cart" class="nav-cart">🛒 Cart</a>
  </div>
</nav>

{% block content %}{% endblock %}

<div class="footer">
  <p>© 2026 ShopLocal — Built with Python Flask & Kubernetes</p>
</div>

</body>
</html>
