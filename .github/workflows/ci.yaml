name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'products/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Get the code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2 - Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3 - Build frontend image
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shoplocal-frontend:${{ github.run_number }} ./frontend

      # Step 4 - Scan frontend with Trivy
      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/shoplocal-frontend:${{ github.run_number }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # Step 5 - Push frontend image
      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shoplocal-frontend:${{ github.run_number }}

      # Step 6 - Build products image
      - name: Build products image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shoplocal-products:${{ github.run_number }} ./products

      # Step 7 - Scan products with Trivy
      - name: Scan products with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/shoplocal-products:${{ github.run_number }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # Step 8 - Push products image
      - name: Push products image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shoplocal-products:${{ github.run_number }}

      # Step 9 - Update values.yaml with new image tag
      - name: Update image tag in values.yaml
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_number }}"/' helm/shoplocal-chart/values.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add helm/shoplocal-chart/values.yaml
          git commit -m "CI: update image tag to ${{ github.run_number }}"
          git push
